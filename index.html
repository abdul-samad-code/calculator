<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calc-container">
    <div class="result-container">
        <h3 class="h3-number">numbers</h3>
        <h3 class="h3-result">result</h3>
    </div>
    <div class="btn-container">
        <button>CLR</button>
        <button>DEL</button>
         <button id="operator+">+</button>
    </div>
    <div class="btn-container">
<button id="btn-1">1</button>
    <button id="btn-2">2</button>
    <button id="btn-3">3</button>
    <button id="operator-">-</button>
    </div>
    <div class="btn-container">
 <button id="btn-4">4</button>
    <button id="btn-5">5</button>
    <button id="btn-6">6</button>
    <button id="operator*">*</button>
    </div>
    <div class="btn-container">
 <button id="btn-7">7</button>
    <button id="btn-8">8</button>
    <button id="btn-9">9</button>
        <button id="operator/">/</button>

    </div>
    <div class="btn-container">
        <button>.</button>
        <button>0</button>
        <button>=</button>
    </div>
    
    
   
   

   
    
    
</div>




    <script src="script.js"></script>
</body>
</html>
